<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game - Pink Theme</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="title">
          <span class="title__word">Snake</span>
          <span class="title__dot">*</span>
        </div>
        <div class="stats">
          <div class="stat">
            <span class="stat__label">Score</span>
            <span id="score" class="stat__value">0</span>
          </div>
          <div class="stat">
            <span class="stat__label">Best</span>
            <span id="best" class="stat__value">0</span>
          </div>
        </div>
      </header>

      <section class="panel">
        <div class="board-wrap">
          <canvas id="board" width="480" height="480" aria-label="Game board"></canvas>
          <div id="overlay" class="overlay hidden">
            <div class="overlay__card">
              <div id="overlay-title" class="overlay__title">Paused</div>
              <div id="overlay-subtitle" class="overlay__subtitle">Press space to resume</div>
              <button id="restart" class="btn">Play again</button>
            </div>
          </div>
        </div>

        <div class="controls">
          <div class="controls__group">
            <button id="start" class="btn btn--primary">Start</button>
            <button id="pause" class="btn">Pause</button>
          </div>
          <div class="controls__group">
            <div class="pill">
              <span class="pill__label">Speed</span>
              <input id="speed" class="pill__range" type="range" min="6" max="18" value="8" />
            </div>
            <div class="pill">
              <span class="pill__label">Grid</span>
              <input id="size" class="pill__range" type="range" min="14" max="28" value="20" />
            </div>
          </div>
          <p class="hint">Controls: arrows/WASD or swipe. Pause: space or tap.</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
